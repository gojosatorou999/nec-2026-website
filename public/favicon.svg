<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" role="img" aria-label="Idea Incubator">
  <defs>
    <radialGradient id="ii-bulb" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0%" stop-color="#ffe98a"/>
      <stop offset="100%" stop-color="#f5c024"/>
    </radialGradient>
  </defs>

  <!-- sky-blue field, matching the club artwork -->
  <rect x="0" y="0" width="100" height="100" rx="14" fill="#8ad4ee"/>

  <!-- heavy "I" with the split foot, traced from the logo -->
  <path d="M20.5 17 H79.5 V31.5 H63.5 V63.5 H79.5 V78 H55 V56 H45 V78 H20.5 V63.5 H36.5 V31.5 H20.5 Z" fill="#111111"/>

  <!-- bulb, centred in the stem -->
  <circle cx="50" cy="47" r="12.4" fill="url(#ii-bulb)" stroke="#111111" stroke-width="1.6"/>

  <!-- radiating rays -->
  <g stroke="#111111" stroke-width="1.9" stroke-linecap="round">
    <line x1="50" y1="30.4" x2="50" y2="26.4"/>
    <line x1="37.6" y1="34.6" x2="40.5" y2="37.5"/>
    <line x1="62.4" y1="34.6" x2="59.5" y2="37.5"/>
    <line x1="32.6" y1="47" x2="36.6" y2="47"/>
    <line x1="67.4" y1="47" x2="63.4" y2="47"/>
    <line x1="35.5" y1="58.2" x2="38.4" y2="55.6"/>
    <line x1="64.5" y1="58.2" x2="61.6" y2="55.6"/>
  </g>

  <!-- filament -->
  <path d="M45.4 46.5 q1.6 5 2.2 8.8 M50 46 q0 5 0 9.3 M54.6 46.5 q-1.6 5 -2.2 8.8"
        fill="none" stroke="#111111" stroke-width="1.5" stroke-linecap="round"/>
  <!-- screw base -->
  <path d="M46 55.8 h8 l-1.4 5.4 h-5.2 Z" fill="url(#ii-bulb)" stroke="#111111" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
